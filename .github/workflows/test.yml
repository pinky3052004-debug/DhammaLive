name: YouTube Live from Google Drive (One Video Per Day) Test

on:
  schedule:
    # Myanmar Standard Time 4:30 AM = UTC 22:00
    - cron: '0 22 * * *'

  workflow_dispatch:

jobs:
  stream_from_drive:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Dependencies
      run: |
        pip install google-auth google-auth-oauthlib google-api-python-client
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    # Debug current server time
    - name: Debug Current Time
      run: |
        echo "===== SERVER LOCAL TIME ====="
        date

        echo "===== UTC TIME ====="
        date -u

        echo "===== MYANMAR TIME ====="
        TZ=Asia/Yangon date

    # Main Python Process
    - name: Process Video, Thumbnail, YouTube Setup & History
      id: main_process
      env:
        CLIENT_ID: ${{ secrets.CLIENT_ID }}
        CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
        REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
        GDRIVE_SERVICE_ACCOUNT: ${{ secrets.GDRIVE_SERVICE_ACCOUNT }}
        GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
      run: |
        cat << 'EOF' > process.py
        import os
        import json
        import datetime
        import io
        import google.oauth2.credentials
        from google.oauth2 import service_account
        from googleapiclient.discovery import build
        from googleapiclient.http import (
            MediaIoBaseDownload,
            MediaFileUpload,
            MediaIoBaseUpload
        )

        # Google Drive API
        gdrive_info = json.loads(os.environ['GDRIVE_SERVICE_ACCOUNT'])

        drive_creds = service_account.Credentials.from_service_account_info(
            gdrive_info
        )

        drive_service = build('drive', 'v3', credentials=drive_creds)

        folder_id = os.environ['GDRIVE_FOLDER_ID']

        print(f"Targeting Google Drive Folder ID: {folder_id}")

        # Find history.txt
        history_results = drive_service.files().list(
            q=f"'{folder_id}' in parents and name = 'history.txt' and trashed = false",
            fields="files(id, name)"
        ).execute()

        history_files = history_results.get('files', [])

        streamed_videos = []
        history_file_id = None

        if history_files:
            history_file_id = history_files[0]['id']

            print(f"Found existing history.txt with ID: {history_file_id}")

            request = drive_service.files().get_media(
                fileId=history_file_id
            )

            fh = io.BytesIO()

            downloader = MediaIoBaseDownload(fh, request)

            done = False

            while done is False:
                status, done = downloader.next_chunk()

            streamed_videos = fh.getvalue().decode('utf-8').splitlines()

            print("Successfully read history from Google Drive.")

        else:
            print("history.txt not found. New file will be created.")

        # Find videos
        results = drive_service.files().list(
            q=f"'{folder_id}' in parents and name contains 'done_' and mimeType contains 'video/' and trashed = false",
            fields="files(id, name)"
        ).execute()

        files = results.get('files', [])

        if not files:
            print("No videos found!")
            exit(1)

        video_to_stream = None

        for file in sorted(files, key=lambda x: x['name']):
            if file['name'] not in streamed_videos:
                video_to_stream = file
                break

        if not video_to_stream:
            print("All videos already streamed.")
            exit(1)

        print(f"Selected Video: {video_to_stream['name']}")

        # Download video
        request = drive_service.files().get_media(
            fileId=video_to_stream['id']
        )

        with open("video.mp4", "wb") as f:
            downloader = MediaIoBaseDownload(f, request)

            done = False

            while done is False:
                status, done = downloader.next_chunk()

        print("Video download completed.")

        # Thumbnail
        today_str = datetime.date.today().strftime("%Y-%m-%d")

        thumb_results = drive_service.files().list(
            q=f"'{folder_id}' in parents and name contains '{today_str}' and mimeType contains 'image/' and trashed = false",
            fields="files(id, name)"
        ).execute()

        thumb_files = thumb_results.get('files', [])

        thumbnail_path = "thumbnail.jpg"

        has_thumbnail = False

        if thumb_files:
            target_thumb = thumb_files[0]

            print(f"Found thumbnail: {target_thumb['name']}")

            thumb_request = drive_service.files().get_media(
                fileId=target_thumb['id']
            )

            with open(thumbnail_path, "wb") as f:
                thumb_downloader = MediaIoBaseDownload(f, thumb_request)

                thumb_done = False

                while thumb_done is False:
                    _, thumb_done = thumb_downloader.next_chunk()

            has_thumbnail = True

            print("Thumbnail downloaded.")

        else:
            print("No thumbnail found for today.")

        # YouTube API
        yt_creds = google.oauth2.credentials.Credentials(
            token=None,
            refresh_token=os.environ['REFRESH_TOKEN'],
            token_uri="https://oauth2.googleapis.com/token",
            client_id=os.environ['CLIENT_ID'],
            client_secret=os.environ['CLIENT_SECRET']
        )

        youtube = build('youtube', 'v3', credentials=yt_creds)

        now = datetime.datetime.now(datetime.timezone.utc)

        scheduled_time = (
            now + datetime.timedelta(seconds=5)
        ).isoformat()

        formatted_date = datetime.date.today().strftime("%B %d, %Y")

        live_title = f"Morning Dhamma Live Stream | {formatted_date}"

        live_description = f"""
        Morning Dhamma Live Stream
        Date: {formatted_date}

        May all beings be happy and peaceful.
        """

        live_tags = [
            "dhamma",
            "meditation",
            "buddha",
            "livestream"
        ]

        # Create Broadcast
        broadcast_res = youtube.liveBroadcasts().insert(
            part="snippet,status,contentDetails",
            body={
                "snippet": {
                    "title": live_title,
                    "description": live_description,
                    "scheduledStartTime": scheduled_time,
                    "tags": live_tags
                },
                "status": {
                    "privacyStatus": "public",
                    "selfDeclaredMadeForKids": False
                },
                "contentDetails": {
                    "enableAutoStart": True,
                    "enableAutoStop": True
                }
            }
        ).execute()

        broadcast_id = broadcast_res['id']

        print(f"Broadcast Created: {broadcast_id}")

        # Upload Thumbnail
        if has_thumbnail:
            try:
                media = MediaFileUpload(
                    thumbnail_path,
                    mimeType='image/jpeg'
                )

                youtube.thumbnails().set(
                    videoId=broadcast_id,
                    media_body=media
                ).execute()

                print("Thumbnail uploaded successfully.")

            except Exception as e:
                print(f"Thumbnail upload failed: {e}")

        # Create Stream
        stream_res = youtube.liveStreams().insert(
            part="snippet,cdn",
            body={
                "snippet": {
                    "title": f"Auto Stream Key - {formatted_date}"
                },
                "cdn": {
                    "frameRate": "30fps",
                    "ingestionType": "rtmp",
                    "resolution": "1080p"
                }
            }
        ).execute()

        # Bind Broadcast + Stream
        youtube.liveBroadcasts().bind(
            id=broadcast_id,
            part="id,contentDetails",
            streamId=stream_res['id']
        ).execute()

        print("Broadcast bound to stream.")

        # Update history.txt
        streamed_videos.append(video_to_stream['name'])

        updated_history_content = (
            "\n".join(streamed_videos) + "\n"
        )

        fh_upload = io.BytesIO(
            updated_history_content.encode('utf-8')
        )

        media_body = MediaIoBaseUpload(
            fh_upload,
            mimetype='text/plain',
            resumable=True
        )

        if history_file_id:
            drive_service.files().update(
                fileId=history_file_id,
                media_body=media_body
            ).execute()

            print("history.txt updated.")

        else:
            file_metadata = {
                'name': 'history.txt',
                'parents': [folder_id]
            }

            new_history_file = drive_service.files().create(
                body=file_metadata,
                media_body=media_body,
                fields='id'
            ).execute()

            print(
                f"history.txt created: {new_history_file.get('id')}"
            )

        # Output Stream Key
        with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
            f.write(
                f"STREAM_KEY={stream_res['cdn']['ingestionInfo']['streamName']}\n"
            )

        print("Process completed successfully.")
        EOF

        python process.py

    # Start FFmpeg Stream
    - name: Start FFmpeg Streaming
      run: |
        echo "Starting YouTube Live Stream..."

        ffmpeg -re -i "video.mp4" \
          -c:v libx264 \
          -preset veryfast \
          -b:v 3000k \
          -maxrate 3000k \
          -bufsize 6000k \
          -pix_fmt yuv420p \
          -g 60 \
          -c:a aac \
          -b:a 128k \
          -ar 44100 \
          -f flv \
          "rtmp://a.rtmp.youtube.com/live2/${{ steps.main_process.outputs.STREAM_KEY }}"
